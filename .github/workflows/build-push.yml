name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_URI }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC — no long-lived AWS credentials stored as secrets
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          echo "sha_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=latest" >> "$GITHUB_OUTPUT"
          echo "image_uri=${{ env.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}" \
            -t "${{ env.ECR_REPOSITORY }}:latest" \
            .

      # Immutable tags: push SHA tag first (will fail if it already exists, preventing overwrite)
      - name: Push SHA-tagged image
        run: docker push "${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}"

      # Push latest last — this push is what EventBridge detects to trigger the pipeline
      - name: Push latest tag
        run: docker push "${{ env.ECR_REPOSITORY }}:latest"

      # Upload deployment artefacts so CodePipeline's GitHub source picks them up
      - name: Update taskdef.json with new image URI
        run: |
          sed -i "s|ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" taskdef.json
          sed -i "s|us-east-1|${{ env.AWS_REGION }}|g" taskdef.json

      - name: Upload deployment artefacts to S3
        run: |
          zip deployment-bundle.zip appspec.yaml taskdef.json
          aws s3 cp deployment-bundle.zip \
            "s3://${{ secrets.ARTIFACT_BUCKET }}/deployment-bundle.zip"
