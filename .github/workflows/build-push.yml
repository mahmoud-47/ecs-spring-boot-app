name: Build and Push to ECR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC — role ARN and region are the only bootstrap values needed before AWS auth
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve AWS resources
        run: |
          ECR_REPOSITORY=$(aws ecr describe-repositories \
            --repository-names ecs-cicd/app \
            --query repositories[0].repositoryUri \
            --output text)
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> "$GITHUB_ENV"
          echo "ARTIFACT_BUCKET=ecs-cicd-pipeline-artifacts-${ACCOUNT_ID}" >> "$GITHUB_ENV"

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t "${{ env.ECR_REPOSITORY }}:latest" .
          docker push "${{ env.ECR_REPOSITORY }}:latest"

      - name: Upload deployment artefacts to S3
        run: |
          echo "{\"ImageURI\": \"${{ env.ECR_REPOSITORY }}:latest\"}" > imageDetail.json
          zip deployment-bundle.zip appspec.yaml taskdef.json imageDetail.json
          aws s3 cp deployment-bundle.zip "s3://${{ env.ARTIFACT_BUCKET }}/deployment-bundle.zip"
