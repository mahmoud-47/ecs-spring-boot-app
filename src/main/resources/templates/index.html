<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECS CI/CD Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 3rem 4rem;
      text-align: center;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .badge {
      display: inline-block;
      background: #0ea5e9;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }

    h2 {
      font-size: 1.125rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .info {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.625rem 1rem;
      background: #0f172a;
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .info-row .label { color: #64748b; }
    .info-row .value { color: #e2e8f0; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">AWS ECS Fargate</span>
    <h1 th:text="${studentName}">Student Name</h1>
    <h2 th:text="${labName}">Lab Name</h2>
    <div class="info">
      <div class="info-row">
        <span class="label">Deployment</span>
        <span class="value">Blue/Green via CodeDeploy</span>
      </div>
      <div class="info-row">
        <span class="label">Container runtime</span>
        <span class="value">AWS Fargate</span>
      </div>
      <div class="info-row">
        <span class="label">CI/CD auth</span>
        <span class="value">GitHub OIDC</span>
      </div>
    </div>
  </div>
</body>
</html>
